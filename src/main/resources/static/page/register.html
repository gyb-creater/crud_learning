<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册页面</title>
    <link rel="stylesheet" href="../element.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #0c4a7c 0%, #1976b8 55%, #6fc2ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #app {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 24px;
            box-sizing: border-box;
        }

        .register-card {
            width: 520px;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(9, 28, 48, 0.78);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
        }

        .register-header {
            padding: 28px 32px 20px;
            text-align: center;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }

        .register-header h2 {
            margin: 0;
            font-size: 30px;
        }

        .register-body {
            padding: 28px 32px 32px;
        }

        .register-form .el-form-item {
            margin-bottom: 18px;
        }

        .register-form .el-input__inner,
        .register-form .el-select .el-input__inner {
            height: 44px;
            line-height: 44px;
            border-radius: 10px;
            border: none;
        }

        .register-btn {
            width: 100%;
            height: 46px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
        }

        .login-row {
            margin-top: 16px;
            text-align: center;
            color: #ffffff;
        }

        .login-row a {
            color: #ffd54f;
            text-decoration: none;
        }
    </style>
</head>
<body>
<div id="app">
    <div class="register-card">
        <div class="register-header">
            <h2>用户注册</h2>
        </div>

        <div class="register-body">
            <!-- 注册页使用 Element UI 表单收集真实注册信息 -->
            <el-form :model="user" class="register-form">
                <el-form-item>
                    <el-input v-model="user.name" placeholder="用户名"></el-input>
                </el-form-item>
                <el-form-item>
                    <el-input v-model="user.password" type="password" placeholder="密码" show-password></el-input>
                </el-form-item>
                <el-form-item>
                    <el-input v-model="confirmPassword" type="password" placeholder="确认密码" show-password></el-input>
                </el-form-item>
                <el-form-item>
                    <el-input v-model="user.age" placeholder="年龄"></el-input>
                </el-form-item>
                <el-form-item>
                    <el-select v-model="user.sex" placeholder="请选择性别" style="width: 100%">
                        <el-option label="男" value="男"></el-option>
                        <el-option label="女" value="女"></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item>
                    <el-input v-model="user.address" placeholder="地址"></el-input>
                </el-form-item>
                <el-form-item>
                    <el-input v-model="user.phone" placeholder="电话"></el-input>
                </el-form-item>
                <el-form-item>
                    <el-select v-model="user.level" placeholder="请选择角色" style="width: 100%">
                        <el-option label="管理员" value="1"></el-option>
                        <el-option label="教师" value="2"></el-option>
                        <el-option label="学生" value="3"></el-option>
                    </el-select>
                </el-form-item>
                <el-form-item>
                    <el-button type="primary" class="register-btn" @click="register">注册</el-button>
                </el-form-item>
            </el-form>

            <div class="login-row">
                <span>已有账号？</span>
                <a href="login.html">返回登录</a>
            </div>
        </div>
    </div>
</div>

<script src="../jquery.min.js"></script>
<script src="../vue.js"></script>
<script src="../element.js"></script>
<script>
    new Vue({
        el: '#app',
        data: {
            user: {
                name: '',
                password: '',
                age: '',
                sex: '',
                address: '',
                phone: '',
                level: ''
            },
            confirmPassword: ''
        },
        methods: {
            // 调用后端注册接口，注册成功后跳转到登录页
            register() {
                if (this.user.password !== this.confirmPassword) {
                    this.$message.error('两次输入的密码不一致');
                    return;
                }
                $.ajax({
                    url: '/user/register',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(this.user)
                }).then(res => {
                    if (res.code === '0') {
                        this.$message.success('注册成功，请登录');
                        setTimeout(function () {
                            window.location.href = 'login.html';
                        }, 600);
                    } else {
                        this.$message.error(res.msg || '注册失败');
                    }
                }).catch(() => {
                    this.$message.error('请求失败，请检查后端服务');
                });
            }
        }
    });
</script>
</body>
</html>
